<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Security | Password Strength Analyzer</title>
    <meta name="description" content="A robust, real-time password strength analyzer with custom entropy calculations for high security.">
    
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --accent-red: #ef4444;
            --accent-yellow: #f59e0b;
            --accent-green: #10b981;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Glassmorphism Header */
        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* Analysis Card */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-group {
            position: relative;
            margin-bottom: 2rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.75rem;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
        }

        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 1.25rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.2);
            background: rgba(0, 0, 0, 0.3);
        }

        .visibility-toggle {
            position: absolute;
            right: 1.25rem;
            top: 2.85rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: color 0.2s;
            background: none;
            border: none;
            font-size: 0.9rem;
        }

        .visibility-toggle:hover {
            color: var(--text-primary);
        }

        /* Strength Meter */
        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .strength-label {
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
        }

        .entropy-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .progress-container {
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.4s;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        /* Feedback Panel */
        .feedback {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 2rem;
            border: 1px solid var(--glass-border);
        }

        .feedback h3 {
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .suggestion-list {
            list-style: none;
        }

        .suggestion-list li {
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
            color: #cbd5e1;
            padding-left: 1.5rem;
            position: relative;
        }

        .suggestion-list li::before {
            content: "•";
            position: absolute;
            left: 0.5rem;
            color: #60a5fa;
        }

        /* Footer */
        footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Responsive Improvements */
        @media (max-width: 480px) {
            .container { padding: 1rem; }
            h1 { font-size: 2rem; }
            .card { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Security Vault</h1>
            <p class="subtitle">Advanced Password Strength Intelligence</p>
        </header>

        <main class="card">
            <div class="input-group">
                <label for="password-input">Password Entry</label>
                <input type="password" id="password-input" placeholder="Enter secure passphrase..." autocomplete="off">
                <button type="button" class="visibility-toggle" id="toggle-visibility">SHOW</button>
            </div>

            <div class="meter-panel">
                <div class="status-header">
                    <span class="strength-label" id="strength-label">Awaiting...</span>
                    <span class="entropy-label" id="entropy-label">0.0 bits</span>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
            </div>

            <div class="feedback" id="feedback-panel">
                <h3>Vulnerability Report</h3>
                <ul class="suggestion-list" id="suggestion-list">
                    <li>Start typing to begin structural analysis.</li>
                </ul>
            </div>

            <div style="text-align: center;">
                <p style="font-size: 0.75rem; color: var(--text-secondary);">
                    Analytic data is processed securely via local Python backend.
                </p>
            </div>
        </main>

        <footer>
            &copy; 2024 Antigravity Security Systems. Built for high-integrity environments.
        </footer>
    </div>

    <script>
        const passwordInput = document.getElementById('password-input');
        const toggleBtn = document.getElementById('toggle-visibility');
        const progressBar = document.getElementById('progress-bar');
        const strengthLabel = document.getElementById('strength-label');
        const entropyLabel = document.getElementById('entropy-label');
        const suggestionList = document.getElementById('suggestion-list');

        let timeout = null;

        // Toggle Visibility
        toggleBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            toggleBtn.textContent = type === 'password' ? 'SHOW' : 'HIDE';
        });

        // Real-time Analysis
        passwordInput.addEventListener('input', (e) => {
            const password = e.target.value;
            
            // Clear previous timeout for debouncing (though lightweight, it's good practice)
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                analyzePassword(password);
            }, 100);
        });

        async function analyzePassword(password) {
            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                
                const data = await response.json();
                updateUI(data);
            } catch (error) {
                console.error("Critical Analysis Error:", error);
            }
        }

        function updateUI(data) {
            // Update Labels
            strengthLabel.textContent = data.status || "Empty";
            entropyLabel.textContent = `${data.effective_entropy} bits`;

            // Update Progress Bar
            const progress = Math.min((data.effective_entropy / 80) * 100, 100);
            progressBar.style.width = `${progress}%`;

            // Dynamic Colors
            let color = '#475569'; // Default Slate
            if (data.status === 'Weak') color = '#ef4444';
            if (data.status === 'Medium') color = '#f59e0b';
            if (data.status === 'Strong') color = '#10b981';

            progressBar.style.backgroundColor = color;
            strengthLabel.style.color = color;

            // Update Suggestions
            suggestionList.innerHTML = '';
            if (data.suggestions && data.suggestions.length > 0) {
                data.suggestions.forEach(s => {
                    const li = document.createElement('li');
                    li.textContent = s;
                    suggestionList.appendChild(li);
                });
            } else if (passwordInput.value === "") {
                suggestionList.innerHTML = '<li>Start typing to begin structural analysis.</li>';
            }
        }
    </script>

</body>
</html>
